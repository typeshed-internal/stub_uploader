name: Check scripts

on:
  push:
  pull_request:

env:
  FORCE_COLOR: 1

jobs:
  black:
    name: Check formatting with black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # 6.2.0
        with:
          python-version: '3.13'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # 6.0.3
      - run: pip install -r requirements.txt
      - run: |
          black --version
          black --check .

  mypy:
    name: Check stub_uploader with mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # 6.2.0
        with:
          python-version: '3.13'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # 6.0.3
      - run: pip install -r requirements.txt
      - run: mypy --strict -p stub_uploader -p tests

  tests:
    name: Run integration and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # 6.2.0
        with:
          # Keep in sync with typeshed's daily.yml and tests.yml workflows.
          python-version: '3.13'
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # 6.0.3
        with:
          path: main
      - name: Checkout typeshed
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # 6.0.3
        with:
          repository: python/typeshed
          path: typeshed
      - name: Run tests
        run: |
          cd main
          pip install -r requirements.txt
          python -Werror -m pytest tests
